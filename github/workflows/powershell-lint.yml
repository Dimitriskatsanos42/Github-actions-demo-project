name: Python Code Quality (Linting)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    # 1. Κατεβάζει τον κώδικα
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Εγκαθιστά την Python στον server του GitHub
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Εγκαθιστά τον linter (Flake8)
    - name: Install Flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # 4. Τρέχει τον έλεγχο
    - name: Run Flake8
      run: |
        # Σταματάει το pipeline αν υπάρχουν συντακτικά λάθη (Python syntax errors)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Ελέγχει για στυλιστικά λάθη (PEP8 standards)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
